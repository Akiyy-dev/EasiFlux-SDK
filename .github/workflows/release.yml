name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest -q

  build-and-release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches project version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          if not tag.startswith("v"):
              raise SystemExit(f"Release tag must start with 'v', got: {tag}")
          if tag[1:] != version:
              raise SystemExit(f"Tag version {tag[1:]} does not match pyproject version {version}")
          print(f"Version verified: {tag}")
          PY

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Generate checksums
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path

          dist_dir = Path("dist")
          lines = []
          for file_path in sorted(dist_dir.iterdir()):
              digest = hashlib.sha256(file_path.read_bytes()).hexdigest()
              lines.append(f"{digest}  {file_path.name}")
          Path("dist/SHA256SUMS.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
